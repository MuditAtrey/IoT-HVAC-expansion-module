<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HVAC Temperature Monitor</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      pre { background: #f6f6f6; padding: 12px; border-radius: 6px; }
      .item { margin-bottom: 12px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
      .temp-display {
        font-size: 24px;
        margin: 20px 0;
        padding: 15px;
        background: #f0f0f0;
        border-radius: 8px;
      }
      .temp-value {
        font-weight: bold;
        color: #2962ff;
      }
    </style>
  </head>
  <body>
    <h1>HVAC Temperature & Humidity Monitor</h1>
    <div class="temp-display">
      <div>Outside Temperature: <span id="outside-temp" class="temp-value">--</span>°C</div>
      <div>Outside Humidity: <span id="outside-hum" class="temp-value">--</span>%</div>
      <div style="margin-top: 10px;">Indoor Temperature: <span id="indoor-temp" class="temp-value">--</span>°C</div>
      <div>Indoor Humidity: <span id="indoor-hum" class="temp-value">--</span>%</div>
    </div>

    <div>
      <button id="refresh">Refresh Now</button>
      <label style="margin-left: 12px;">Auto-refresh:
        <input type="checkbox" id="autorefresh" checked />
      </label>
      <label style="margin-left: 12px;">Interval (s):
        <input type="number" id="interval" value="2" style="width: 60px" />
      </label>
    </div>

    <h2>Latest</h2>
    <div id="latest">(no data yet)</div>

    <h2>Recent (up to 100)</h2>
    <div id="recent"></div>

    <script src="/static/app.js"></script>
  </body>
</html>
